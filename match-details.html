<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchday — Match Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="floodlight-glow" aria-hidden="true"></div>

  <header class="site-header">
    <a href="index.html" class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      MATCHDAY
    </a>
    <nav class="main-nav" aria-label="Primary">
      <a href="index.html" class="nav-link">Home</a>
      <a href="find-party.html" class="nav-link">Find a Party</a>
      <a href="#" class="nav-link nav-link--disabled" title="Coming soon">My Parties</a>
      <a href="#" class="nav-link nav-link--disabled" title="Coming soon">Profile</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main>

    <a href="index.html" class="back-link">← Back to matchday board</a>

    <!--
      MATCH SUMMARY — API HOOK
      -------------------------
      Container: #match-summary
      Reads the `id` query param (e.g. match-details.html?id=m1) and should
      render the same match-card markup used on the home page. See
      script.js → renderMatchSummary() for the mock version to replace.
    -->
    <section class="match-summary-section" aria-labelledby="summary-heading">
      <h1 id="summary-heading" class="visually-hidden">Match details</h1>
      <div id="match-summary" class="match-display">
        <div class="match-card match-card--skeleton" aria-hidden="true">
          <div class="skeleton-line skeleton-line--tag"></div>
          <div class="skeleton-row">
            <div class="skeleton-crest"></div>
            <div class="skeleton-score"></div>
            <div class="skeleton-crest"></div>
          </div>
          <div class="skeleton-line skeleton-line--venue"></div>
        </div>
      </div>
    </section>

    <!--
      TEAM STATS — API HOOK
      ----------------------
      Container: #team-stats
      Expects a stat comparison object per match. See
      script.js → renderTeamStats() / fetchMockMatchStats() for shape.
    -->
    <section class="stats-section" aria-labelledby="team-stats-heading">
      <div class="section-head">
        <p class="eyebrow">Team stats</p>
        <h2 id="team-stats-heading">Head to head</h2>
      </div>
      <div id="team-stats" class="team-stats-card">
        <p class="match-empty">Loading team stats…</p>
      </div>
    </section>

    <!--
      PLAYER STATS — API HOOK
      -------------------------
      Container: #player-stats
      Expects a roster array per team. See
      script.js → renderPlayerStats() for the exact fields per player.
    -->
    <section class="stats-section" aria-labelledby="player-stats-heading">
      <div class="section-head">
        <p class="eyebrow">Player stats</p>
        <h2 id="player-stats-heading">On the team sheet</h2>
      </div>
      <div id="player-stats" class="roster-grid">
        <p class="match-empty">Loading player stats…</p>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Matchday · built for fans who hate watching alone</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
